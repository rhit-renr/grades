<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GPA">
<meta name="theme-color" content="#7EC8E3">
<title>成绩 &amp; GPA</title>
<style>
:root{
  --sky:#7EC8E3; --sky-d:#4BA3CC; --sky-dd:#2E86AB; --sky-l:#D6EEF8; --sky-ll:#EDF7FC;
  --ink:#1C3A4B; --ink2:#5A7A8C; --ink3:#94AEBD;
  --bg:#F5FAFD; --card:#FFFFFF; --line:#E3F0F7; --line2:#C9E2F0;
  --green:#3FA796; --gold:#E0A458; --red:#D9676B;
  --radm:10px; --radl:16px; --radxl:22px;
  --nav-h:62px;
}
@media (prefers-color-scheme: dark){
  :root{
    --sky:#5BA3C7; --sky-d:#6FB8DC; --sky-dd:#8FCDE8; --sky-l:#1E3A47; --sky-ll:#172C36;
    --ink:#E6F2F8; --ink2:#9FBECE; --ink3:#6B8595;
    --bg:#0F1A20; --card:#172530; --line:#22323D; --line2:#2E4350;
    --green:#5BBFAE; --gold:#E0A458; --red:#E08488;
  }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased;}
html,body{margin:0; padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
.wrap{max-width:760px; margin:0 auto; padding:0 14px;}
.hero{
  background:linear-gradient(135deg, var(--sky) 0%, var(--sky-d) 100%);
  border-radius:0 0 var(--radxl) var(--radxl);
  padding:calc(env(safe-area-inset-top) + 18px) 18px 20px;
  color:#fff; box-shadow:0 4px 18px rgba(75,163,204,.25);
}
.hero h1{margin:0; font-size:19px; font-weight:600; letter-spacing:.3px;}
.hero .sub{font-size:12px; opacity:.92; margin-top:2px;}
.hero-gpa{display:flex; align-items:flex-end; gap:18px; margin-top:14px;}
.hero-gpa .big{font-size:40px; font-weight:700; line-height:1;}
.hero-gpa .biglbl{font-size:12px; opacity:.9; margin-bottom:4px;}
.hero-gpa .meta{font-size:12px; opacity:.88; margin-bottom:5px;}
.page{padding-top:14px; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);}to{opacity:1; transform:none;}}
.pagetitle{font-size:17px; font-weight:600; margin:2px 0 12px; color:var(--ink);}
.muted{font-size:12px; color:var(--ink2);}
.tabs{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px;}
.tab{font-size:12px; padding:7px 12px; border:none; background:var(--card); color:var(--ink2);
  border-radius:20px; cursor:pointer; box-shadow:0 1px 4px rgba(75,163,204,.08); transition:.15s;}
.tab.active{background:var(--sky-d); color:#fff; font-weight:600; box-shadow:0 2px 8px rgba(75,163,204,.3);}
.sumcards{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:14px;}
.sumcard{background:var(--card); border-radius:var(--radm); padding:11px 12px; box-shadow:0 1px 5px rgba(75,163,204,.07);}
.sumcard .lbl{font-size:11px; color:var(--ink2);}
.sumcard .val{font-size:19px; font-weight:700; color:var(--sky-dd); margin-top:2px;}
.course{background:var(--card); border-radius:var(--radl); padding:13px 14px; margin-bottom:11px;
  box-shadow:0 2px 10px rgba(75,163,204,.08); transition:.15s;}
.crow{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.cat{background:var(--sky-ll); border-radius:var(--radm); padding:9px 10px; margin:7px 0;}
.cathead{display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:5px;}
.itemrow{display:flex; gap:6px; align-items:center; margin:5px 0;}
input,select{font-family:inherit; font-size:13px; height:34px; padding:0 9px;
  border:1.5px solid var(--line2); border-radius:9px; background:var(--card); color:var(--ink); outline:none; transition:.15s;}
input:focus,select:focus{border-color:var(--sky-d); box-shadow:0 0 0 3px rgba(126,200,227,.22);}
input::placeholder{color:var(--ink3);}
button{font-family:inherit; font-size:13px; height:34px; padding:0 12px; border:1.5px solid var(--line2);
  background:var(--card); color:var(--ink); border-radius:9px; cursor:pointer; display:inline-flex;
  align-items:center; gap:5px; transition:.12s;}
button:active{transform:scale(.96);}
.btn-icon{width:34px; padding:0; justify-content:center; color:var(--ink3); border-color:transparent; background:transparent;}
.btn-icon:hover{color:var(--red);}
.bigbtn{width:100%; height:44px; font-size:14px; justify-content:center; margin-top:4px; border-style:dashed;}
.pct{font-size:15px; font-weight:700; min-width:60px; text-align:right;}
.cr{font-size:11px; color:var(--ink2);}
.info{color:var(--sky-dd);}
.warn{color:var(--gold);}
.chip{display:inline-flex; align-items:center; padding:3px 9px; border-radius:12px; font-size:12px; font-weight:600;}
.chip-a{background:#E3F5F1; color:#2E8073;} .chip-b{background:var(--sky-l); color:var(--sky-dd);}
.chip-c{background:#FBF0DE; color:#B07B33;} .chip-d{background:#FBE3E4; color:#B0484C;}
.chip-none{background:var(--line); color:var(--ink3);}
@media (prefers-color-scheme: dark){
  .chip-a{background:#1E3A35;} .chip-c{background:#3A2E18;} .chip-d{background:#3A1E20;}
}
.gpa-hero{background:linear-gradient(135deg,var(--sky-l),var(--card)); border-radius:var(--radl);
  padding:18px; text-align:center; margin-bottom:14px; box-shadow:0 2px 12px rgba(75,163,204,.1);}
.gpa-hero .n{font-size:46px; font-weight:700; color:var(--sky-dd); line-height:1;}
.gpa-hero .l{font-size:13px; color:var(--ink2); margin-top:4px;}
.termbar{background:var(--card); border-radius:var(--radm); padding:11px 13px; margin-bottom:9px;
  box-shadow:0 1px 5px rgba(75,163,204,.07); display:flex; align-items:center; gap:12px;}
.termbar .nm{font-weight:600; font-size:14px; min-width:74px;}
.bartrack{flex:1; height:8px; background:var(--line); border-radius:4px; overflow:hidden;}
.barfill{height:100%; background:linear-gradient(90deg,var(--sky),var(--sky-d)); border-radius:4px; transition:width .4s ease;}
.termbar .g{font-weight:700; font-size:15px; color:var(--sky-dd); min-width:42px; text-align:right;}
.fcterm{background:var(--card); border-radius:var(--radl); padding:13px 14px; margin-bottom:11px;
  box-shadow:0 2px 10px rgba(75,163,204,.08);}
.fcterm h3{margin:0 0 8px; font-size:14px; font-weight:600; color:var(--sky-dd);
  display:flex; justify-content:space-between; align-items:center;}
.fcrow{display:flex; align-items:center; gap:8px; padding:6px 0; border-top:1px solid var(--line);}
.fcrow:first-of-type{border-top:none;}
.fccode{font-weight:600; font-size:13px; min-width:74px;}
.fctitle{flex:1; font-size:12px; color:var(--ink2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.setcard{background:var(--card); border-radius:var(--radl); padding:6px 4px; margin-bottom:12px; box-shadow:0 2px 10px rgba(75,163,204,.08);}
.setrow{display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--line); cursor:pointer;}
.setrow:last-child{border-bottom:none;}
.setrow .ic{width:34px; height:34px; border-radius:10px; background:var(--sky-l); color:var(--sky-dd);
  display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;}
.setrow .tx{flex:1;} .setrow .tx .t{font-weight:600; font-size:14px;} .setrow .tx .d{font-size:11px; color:var(--ink2);}
.setrow .ar{color:var(--ink3);}
.helpcard{background:var(--sky-ll); border-radius:var(--radm); padding:12px 14px; font-size:12px; color:var(--ink2); line-height:1.6;}
.bottomnav{position:fixed; left:0; right:0; bottom:0; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--card); display:flex; box-shadow:0 -2px 16px rgba(75,163,204,.12);
  border-top:1px solid var(--line); z-index:100;}
.navbtn{flex:1; border:none; background:none; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; color:var(--ink3); cursor:pointer; height:var(--nav-h); transition:.15s; padding:0;}
.navbtn .ni{font-size:22px; line-height:1;}
.navbtn .nl{font-size:10px; font-weight:500;}
.navbtn.active{color:var(--sky-d);}
.navbtn.active .ni{transform:translateY(-1px);}
.navbtn:active{transform:scale(.92);}
.statusToast{position:fixed; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px); left:50%;
  transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; font-size:12px;
  padding:7px 16px; border-radius:18px; opacity:0; pointer-events:none; transition:.25s; z-index:200;}
.statusToast.show{opacity:.95; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="hero">
  <h1>成绩 &amp; GPA 追踪</h1>
  <div class="sub">每条作业逐项记 · 自动 average × weight</div>
  <div class="hero-gpa">
    <div>
      <div class="biglbl">累计 GPA</div>
      <div class="big" id="heroGpa">—</div>
    </div>
    <div class="meta" id="heroHrs"></div>
  </div>
</div>

<div class="wrap">
  <div id="pageGrades" class="page"></div>
  <div id="pageGpa" class="page" style="display:none;"></div>
  <div id="pageFlow" class="page" style="display:none;"></div>
  <div id="pageDegree" class="page" style="display:none;"></div>
  <div id="pageSettings" class="page" style="display:none;"></div>
</div>

<nav class="bottomnav">
  <button class="navbtn active" data-nav="Grades"><span class="ni">📝</span><span class="nl">成绩</span></button>
  <button class="navbtn" data-nav="Gpa"><span class="ni">📊</span><span class="nl">GPA总览</span></button>
  <button class="navbtn" data-nav="Flow"><span class="ni">🗺️</span><span class="nl">课表</span></button>
  <button class="navbtn" data-nav="Degree"><span class="ni">🎓</span><span class="nl">毕业</span></button>
  <button class="navbtn" data-nav="Settings"><span class="ni">⚙️</span><span class="nl">设置</span></button>
</nav>

<div class="statusToast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none;">

<script>
const LETTERS={"A":4.0,"B+":3.5,"B":3.0,"C+":2.5,"C":2.0,"D+":1.5,"D":1.0,"F":0.0,"W":null,"S":null,"I":null};
const GPA_LETTERS=["A","B+","B","C+","C","D+","D","F"];
const KEY="rhit_gpa_tracker_v1";
function uid(){return Math.random().toString(36).slice(2,9);}

function seed(){
  const c=(code,title,cr,cats)=>({id:uid(),code,title,cr,letter:"",cats});
  const cat=(name,weight,labels)=>({id:uid(),name,weight,items:labels.map(l=>({id:uid(),label:l,got:"",max:100}))});
  return {activeTerm:0, terms:[
    {id:uid(),name:"Y2 Fall",courses:[
      c("ES201","Conservation & Accounting",4,[cat("Exam 1",0.15,["E1"]),cat("Exam 2",0.15,["E2"]),cat("Exam 3",0.15,["E3"]),cat("Exam 4",0.15,["E4"]),cat("Learning Checks",0.01,["LC"]),cat("Homework",0.09,["HW"]),cat("Final",0.30,["Final"])]),
      c("ES213","Electrical Systems",4,[cat("Comp 1",0.40,["C1"]),cat("Comp 2",0.30,["C2"]),cat("Comp 3",0.20,["C3"]),cat("Comp 4",0.10,["C4"])]),
      c("MA223","Engineering Statistics I",4,[cat("Exam 1",0.15,["E1"]),cat("Exam 2",0.15,["E2"]),cat("Exam 3",0.15,["E3"]),cat("Exam 4",0.15,["E4"]),cat("Lab",0.30,["Lab"]),cat("Attendance",0.10,["Att"])]),
      c("EM104","Graphical Communications",2,[cat("Work Packets",0.20,["WP"]),cat("Midterm",0.20,["M"]),cat("Project",0.20,["P"]),cat("Final",0.40,["F"])]),
    ]},
    {id:uid(),name:"Y2 Winter",courses:[
      c("MA222","Matrix Algebra & DiffEq II",4,[cat("WebWork",0.08,["WW"]),cat("Written HW",0.10,["WHW"]),cat("Exam 1",0.20,["E1"]),cat("Exam 2",0.20,["E2"]),cat("Exam 3",0.20,["E3"]),cat("Final",0.22,["F"])]),
      c("EM304","Adv CAD: Prof Certif",4,[cat("CSWA",0.10,["A"]),cat("CSWP",0.30,["P"]),cat("Project",0.30,["Proj"]),cat("Work Packets",0.20,["WP"]),cat("Final",0.10,["F"])]),
      c("ES214","Mechanical Systems",4,[cat("Exam 1",0.22,["E1"]),cat("Exam 2 Analytical",0.22,["E2a"]),cat("Exam 2 Programming",0.10,["E2p"]),cat("Final",0.36,["F"]),cat("Homework",0.10,["HW"])]),
      c("ME201","Applications of Thermo",4,[cat("Homework",0.10,["HW"]),cat("Exam 1",0.20,["E1"]),cat("Exam 2",0.20,["E2"]),cat("Quiz 1",0.03,["Q1"]),cat("Quiz 2",0.07,["Q2"]),cat("Project",0.05,["P"]),cat("Final",0.35,["F"])]),
    ]},
    {id:uid(),name:"Y2 Spring",courses:[
      c("EM204","Statics & Mech II",4,[cat("Quiz",0.02,["Q"]),cat("Homework",0.08,["HW"]),cat("Projects",0.06,["P"]),cat("Midterm",0.54,["M"]),cat("Final",0.30,["F"])]),
      c("ME328","Material Engineering",4,[cat("Quiz",0.025,["Q"]),cat("Mini Lab",0.025,["ML"]),cat("Homework",0.10,["HW"]),cat("Lab/Projects",0.15,["LP"]),cat("Midterm",0.40,["M"]),cat("Final",0.30,["F"])]),
      c("EM230","Mechatronic Systems",4,[cat("Quiz",0.10,["Q"]),cat("Lab",0.15,["L"]),cat("Projects",0.25,["P"]),cat("Midterm",0.30,["M"]),cat("Final",0.20,["F"])]),
    ]},
    {id:uid(),name:"Y3 Fall",courses:[c("ME380","Machine Component Design",4,[]),c("ES305","System Dynamics",4,[]),c("ES312","Fluid Systems",4,[]),c("ENGL H334","Narratives of Travel",4,[])]},
    {id:uid(),name:"Y3 Winter",courses:[c("ME317","Design for Manufacturing",4,[]),c("ME321","Measurement Systems",4,[]),c("ME306","Control Systems",4,[]),c("HSSA","HSSA Elective",4,[]),c("ME227","Numerical Methods",4,[])]},
    {id:uid(),name:"Y3 Spring",courses:[c("ME302","Heat Transfer",4,[]),c("ME421","ME Lab",2,[])]},
    {id:uid(),name:"Y4 Fall",courses:[c("ME421","ME Lab",2,[]),c("ME470","Capstone Design I",4,[]),c("TECH","Technical Elective",4,[]),c("HSSA","HSSA Elective",4,[])]},
    {id:uid(),name:"Y4 Winter",courses:[c("ME471","Capstone Design II",4,[]),c("TECH","Technical Elective",4,[]),c("HSSA","HSSA Elective",4,[]),c("FREE","Free Elective",4,[])]},
    {id:uid(),name:"Y4 Spring",courses:[c("ME472","Capstone Design III",4,[]),c("TECH","Technical Elective",4,[]),c("TECH","Technical Elective",4,[]),c("HSSA","HSSA Elective",4,[])]},
  ]};
}

let state=null, openCourses={}, page="Grades";

function load(){
  try{const r=localStorage.getItem(KEY); if(r) state=JSON.parse(r);}catch(e){}
  if(!state) state=seed();
  renderAll();
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state)); toast("已保存 ✓");}catch(e){toast("保存失败");}
}
let tt=null;
function toast(t){const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>el.classList.remove("show"),1400);}

function catAvg(cat){const v=cat.items.filter(i=>i.got!==""&&i.got!=null&&i.max!==""&&i.max!=null&&Number(i.max)>0); if(!v.length)return null; return v.reduce((a,i)=>a+Number(i.got)/Number(i.max),0)/v.length;}
function courseFinal(co){let s=0,w=0; for(const cat of co.cats){const av=catAvg(cat); if(av!=null){s+=av*Number(cat.weight); w+=Number(cat.weight);}} return (co.cats.length&&w>0)?s:null;}
function weightSum(co){return co.cats.reduce((a,c)=>a+Number(c.weight||0),0);}
function termGpa(t){let qp=0,h=0; for(const co of t.courses){if(GPA_LETTERS.includes(co.letter)){qp+=Number(co.cr)*LETTERS[co.letter]; h+=Number(co.cr);}} return {gpa:h>0?qp/h:null,hrs:h,qp};}
function cumGpa(){let qp=0,h=0; for(const t of state.terms){const g=termGpa(t); qp+=g.qp; h+=g.hrs;} return {gpa:h>0?qp/h:null,hrs:h};}

const REQ_CATS=["HSSA","General","Major","Electives"];
const REQ_DEFAULT={HSSA:36,General:44,Major:86,Electives:28};
function autoCat(code){
  const c=(code||"").toUpperCase().replace(/\s+/g,"");
  if(c.startsWith("ENGL")||c.startsWith("HUM")||c.startsWith("HSSA")) return "HSSA";
  if(c.startsWith("MA")||c.startsWith("PH")||c.startsWith("CHEM")||c.startsWith("ESL")||c.startsWith("RHIT")) return "General";
  if(c.startsWith("ME")||c.startsWith("EM")||c.startsWith("ES")) return "Major";
  if(c.startsWith("TECH")||c.startsWith("FREE")) return "Electives";
  return "Electives";
}
function courseReqCat(co){ return co.reqCat || autoCat(co.code); }
function isDone(co){ return co.letter && co.letter!=="F" && co.letter!=="W" && co.letter!=="I" && co.letter!=="U"; }
function reqProgress(){
  const req=Object.assign({}, REQ_DEFAULT, (state.reqOverride||{}));
  const applied={HSSA:0,General:0,Major:0,Electives:0};
  const done={HSSA:[],General:[],Major:[],Electives:[]};
  const remaining={HSSA:[],General:[],Major:[],Electives:[]};
  for(const t of state.terms){
    for(const co of t.courses){
      const cat=courseReqCat(co);
      if(!REQ_CATS.includes(cat)) continue;
      if(isDone(co)){ applied[cat]+=Number(co.cr||0); done[cat].push(co); }
      else { remaining[cat].push(co); }
    }
  }
  let totReq=0,totApp=0;
  for(const k of REQ_CATS){ totReq+=req[k]; totApp+=applied[k]; }
  return {req,applied,done,remaining,totReq,totApp};
}
function pct(x){return x==null?"—":(x*100).toFixed(2)+"%";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function letterChip(l){if(!l)return'<span class="chip chip-none">—</span>'; const cls=l[0]==="A"?"chip-a":l[0]==="B"?"chip-b":l[0]==="C"?"chip-c":"chip-d"; return`<span class="chip ${cls}">${l}</span>`;}

function renderAll(){renderHero(); renderGrades(); renderGpa(); renderFlow(); renderDegree(); renderSettings();}
function renderHero(){const cg=cumGpa(); document.getElementById("heroGpa").textContent=cg.gpa!=null?cg.gpa.toFixed(2):"—"; document.getElementById("heroHrs").textContent=cg.hrs>0?cg.hrs+" 计入学分":"";}

function renderGrades(){
  const t=state.terms[state.activeTerm];
  const tabs=state.terms.map((tm,i)=>{const g=termGpa(tm); return`<button class="tab ${i===state.activeTerm?'active':''}" data-term="${i}">${esc(tm.name)}${g.gpa!=null?` · ${g.gpa.toFixed(2)}`:''}</button>`;}).join("");
  const g=termGpa(t), totCr=t.courses.reduce((a,c)=>a+Number(c.cr||0),0);
  const sum=`<div class="sumcards">
    <div class="sumcard"><div class="lbl">学期 GPA</div><div class="val">${g.gpa!=null?g.gpa.toFixed(3):"—"}</div></div>
    <div class="sumcard"><div class="lbl">计入GPA学分</div><div class="val">${g.hrs}</div></div>
    <div class="sumcard"><div class="lbl">本学期学分</div><div class="val">${totCr}</div></div></div>`;
  const list=t.courses.map((co,ci)=>courseCard(co,ci)).join("");
  document.getElementById("pageGrades").innerHTML=`<div class="tabs">${tabs}</div>${sum}${list}<button class="bigbtn" id="addCourseBtn">＋ 添加课程到当前学期</button>`;
  bindGrades();
}
function courseCard(co,ci){
  const fin=courseFinal(co), open=openCourses[co.id], ws=weightSum(co);
  const wWarn=co.cats.length&&Math.abs(ws-1)>0.001;
  const letterOpts=["",...Object.keys(LETTERS)].map(l=>`<option ${l===co.letter?"selected":""}>${l}</option>`).join("");
  let body="";
  if(open){
    body=`<div style="margin-top:8px;">`+co.cats.map((cat,cati)=>{
      const av=catAvg(cat);
      const items=cat.items.map((it,ii)=>`<div class="itemrow">
        <input data-edit="item-label" data-c="${ci}" data-cat="${cati}" data-i="${ii}" value="${esc(it.label)}" placeholder="名称" style="width:60px;"/>
        <input data-edit="item-got" data-c="${ci}" data-cat="${cati}" data-i="${ii}" value="${it.got===""||it.got==null?"":it.got}" placeholder="得分" inputmode="decimal" style="width:54px;"/>
        <span style="color:var(--ink3);">/</span>
        <input data-edit="item-max" data-c="${ci}" data-cat="${cati}" data-i="${ii}" value="${it.max===""||it.max==null?"":it.max}" placeholder="满分" inputmode="decimal" style="width:54px;"/>
        <span class="muted" style="min-width:38px;">${it.got!==""&&it.got!=null&&it.max?(it.got/it.max*100).toFixed(0)+"%":""}</span>
        <button class="btn-icon" data-act="del-item" data-c="${ci}" data-cat="${cati}" data-i="${ii}" aria-label="删除">✕</button></div>`).join("");
      return`<div class="cat">
        <div class="cathead">
          <input data-edit="cat-name" data-c="${ci}" data-cat="${cati}" value="${esc(cat.name)}" style="width:114px; font-weight:600;"/>
          <span class="muted">权重</span>
          <input data-edit="cat-weight" data-c="${ci}" data-cat="${cati}" value="${cat.weight}" inputmode="decimal" style="width:54px;"/>
          <span class="info" style="margin-left:auto; font-size:12px;">avg ${av!=null?(av*100).toFixed(1)+"%":"—"}${av!=null?` · ${(av*cat.weight*100).toFixed(1)}%`:""}</span>
          <button class="btn-icon" data-act="del-cat" data-c="${ci}" data-cat="${cati}" aria-label="删除类别">🗑</button>
        </div>${items}
        <button data-act="add-item" data-c="${ci}" data-cat="${cati}" style="height:30px; font-size:12px;">＋ 加成绩</button>
      </div>`;
    }).join("")+
    `<button data-act="add-cat" data-c="${ci}" style="font-size:12px; margin-top:2px;">＋ 加类别 (Quiz/HW/Exam…)</button>
     ${wWarn?`<div class="warn" style="font-size:12px; margin-top:7px;">⚠ 权重合计 ${(ws*100).toFixed(0)}%，应为 100%</div>`:""}</div>`;
  }
  return`<div class="course">
    <div class="crow">
      <button class="btn-icon" data-act="toggle" data-c="${ci}" aria-label="展开" style="color:var(--sky-d);">${open?'▾':'▸'}</button>
      <input data-edit="co-code" data-c="${ci}" value="${esc(co.code)}" style="width:80px; font-weight:600; font-size:14px;"/>
      <input data-edit="co-title" data-c="${ci}" value="${esc(co.title)}" style="flex:1; min-width:90px;"/>
      <input data-edit="co-cr" data-c="${ci}" value="${co.cr}" inputmode="decimal" style="width:38px; text-align:center;"/>
      <span class="cr">cr</span>
      <span class="pct" style="color:${fin!=null?'var(--ink)':'var(--ink3)'};">${pct(fin)}</span>
      <select data-edit="co-letter" data-c="${ci}" style="width:58px;">${letterOpts}</select>
      <button class="btn-icon" data-act="del-course" data-c="${ci}" aria-label="删除课程">🗑</button>
    </div>${body}</div>`;
}
function curTerm(){return state.terms[state.activeTerm];}
function bindGrades(){
  const root=document.getElementById("pageGrades");
  root.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{state.activeTerm=+b.dataset.term; renderGrades();});
  root.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>handleAct(el.dataset));
  root.querySelectorAll("[data-edit]").forEach(el=>{
    const ev=el.tagName==="SELECT"?"change":"input";
    el.addEventListener(ev,()=>handleEdit(el));
    if(el.tagName!=="SELECT") el.addEventListener("blur",()=>{renderGrades(); renderHero(); save();});
  });
  const ab=document.getElementById("addCourseBtn");
  if(ab) ab.onclick=()=>{curTerm().courses.push({id:uid(),code:"新课程",title:"",cr:4,letter:"",cats:[]}); renderGrades(); save();};
}
function handleEdit(el){
  const d=el.dataset, t=curTerm(), co=t.courses[+d.c], v=el.value;
  switch(d.edit){
    case "co-code": co.code=v; break;
    case "co-title": co.title=v; break;
    case "co-cr": co.cr=v===""?0:parseFloat(v)||0; break;
    case "co-letter": co.letter=v; renderGrades(); renderHero(); save(); return;
    case "cat-name": co.cats[+d.cat].name=v; break;
    case "cat-weight": co.cats[+d.cat].weight=v===""?0:parseFloat(v)||0; break;
    case "item-label": co.cats[+d.cat].items[+d.i].label=v; break;
    case "item-got": co.cats[+d.cat].items[+d.i].got=v===""?"":parseFloat(v); break;
    case "item-max": co.cats[+d.cat].items[+d.i].max=v===""?"":parseFloat(v); break;
  }
  renderHero();
}
function handleAct(d){
  const t=curTerm();
  switch(d.act){
    case "toggle":{const co=t.courses[+d.c]; openCourses[co.id]=!openCourses[co.id]; renderGrades(); break;}
    case "del-course": if(confirm("删除这门课？")){t.courses.splice(+d.c,1); renderGrades(); save();} break;
    case "add-cat": t.courses[+d.c].cats.push({id:uid(),name:"新类别",weight:0,items:[]}); renderGrades(); save(); break;
    case "del-cat": t.courses[+d.c].cats.splice(+d.cat,1); renderGrades(); save(); break;
    case "add-item": t.courses[+d.c].cats[+d.cat].items.push({id:uid(),label:"",got:"",max:100}); renderGrades(); save(); break;
    case "del-item": t.courses[+d.c].cats[+d.cat].items.splice(+d.i,1); renderGrades(); save(); break;
  }
}

function renderGpa(){
  const cg=cumGpa();
  const bars=state.terms.map(t=>{
    const g=termGpa(t);
    const w=g.gpa!=null?(g.gpa/4*100):0;
    return`<div class="termbar"><div class="nm">${esc(t.name)}</div>
      <div class="bartrack"><div class="barfill" style="width:${w.toFixed(0)}%;"></div></div>
      <div class="g">${g.gpa!=null?g.gpa.toFixed(2):"—"}</div></div>`;
  }).join("");
  document.getElementById("pageGpa").innerHTML=
    `<div class="pagetitle">GPA 总览</div>
     <div class="gpa-hero"><div class="n">${cg.gpa!=null?cg.gpa.toFixed(3):"—"}</div>
       <div class="l">累计 GPA · ${cg.hrs} 计入学分</div></div>
     <div class="muted" style="margin-bottom:8px;">各学期 GPA（满格 = 4.0）</div>
     ${bars}
     <div class="helpcard" style="margin-top:12px;">RHIT 满分 4.0，无 A-/B-。学期 GPA 只统计已选 letter 的课；W/S/I 不计入。</div>`;
}

function renderFlow(){
  // group terms by year prefix (Y1/Y2/Y3/Y4)
  const groups={};
  state.terms.forEach((t,idx)=>{
    const m=(t.name.match(/^Y(\d+)/)||[])[1]||"?";
    (groups[m]=groups[m]||[]).push({t,idx});
  });
  if(!window._flowOpen) window._flowOpen={"3":true}; // default open Y3 (current)
  const years=Object.keys(groups).sort();
  const blocks=years.map(y=>{
    const open=window._flowOpen[y];
    const terms=groups[y];
    // year totals
    let yCr=0, yQp=0, yH=0;
    terms.forEach(({t})=>{ const g=termGpa(t); yQp+=g.qp; yH+=g.hrs; t.courses.forEach(co=>yCr+=Number(co.cr||0)); });
    const yGpa=yH>0?(yQp/yH):null;
    const inner = open ? terms.map(({t,idx})=>{
      const rows=t.courses.map(co=>{
        const fin=courseFinal(co);
        return`<div class="fcrow"><span class="fccode">${esc(co.code)}</span>
          <span class="fctitle">${esc(co.title)}</span>
          <span class="muted">${fin!=null?(fin*100).toFixed(0)+"%":""}</span>
          ${letterChip(co.letter)}</div>`;
      }).join("");
      const g=termGpa(t), cr=t.courses.reduce((a,c)=>a+Number(c.cr||0),0);
      const qname=t.name.replace(/^Y\d+\s*/,"");
      return`<div style="background:var(--sky-ll); border-radius:var(--radm); padding:10px 12px; margin:8px 0;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
          <span style="font-weight:600; font-size:13px; color:var(--sky-dd);">${esc(qname)}</span>
          <span class="muted">${cr} cr${g.gpa!=null?` · GPA ${g.gpa.toFixed(2)}`:""}</span>
        </div>${rows}</div>`;
    }).join("") : "";
    return`<div class="fcterm">
      <h3 data-yr="${y}" style="cursor:pointer; user-select:none;">
        <span>${open?'▾':'▸'} Year ${y}</span>
        <span class="muted" style="font-weight:400;">${yCr} cr${yGpa!=null?` · GPA ${yGpa.toFixed(2)}`:""}</span>
      </h3>${inner}</div>`;
  }).join("");
  document.getElementById("pageFlow").innerHTML=
    `<div class="pagetitle">四年课表</div>
     <div class="helpcard" style="margin-bottom:12px;">点开每个 Year 查看各 Quarter。编辑请去「成绩」页。Transfer/AP 课（MA221·ECON S151·MA290）不计入 RHIT GPA。</div>${blocks}`;
  document.querySelectorAll("#pageFlow h3[data-yr]").forEach(el=>{
    el.onclick=()=>{ const y=el.dataset.yr; window._flowOpen[y]=!window._flowOpen[y]; renderFlow(); };
  });
}

function renderDegree(){
  const p=reqProgress();
  const catColor={HSSA:"#9C6BC4",General:"#4BA3CC",Major:"#3FA796",Electives:"#E0A458"};
  const catName={HSSA:"HSSA 人文社科艺术",General:"General 通识/数理",Major:"Major 机械专业",Electives:"Electives 选修"};
  const overallPct = p.totReq>0 ? Math.min(100, p.totApp/p.totReq*100) : 0;
  if(!window._degOpen) window._degOpen={};
  const cards=REQ_CATS.map(k=>{
    const req=p.req[k], app=p.applied[k], pctv=req>0?Math.min(100,app/req*100):0;
    const open=window._degOpen[k];
    const doneList=p.done[k].map(co=>`<div class="fcrow"><span class="fccode">${esc(co.code)}</span><span class="fctitle">${esc(co.title)}</span><span class="muted">${co.cr}cr</span>${letterChip(co.letter)}</div>`).join("")
      || `<div class="muted" style="padding:4px 0;">还没有已完成的课</div>`;
    const remList=p.remaining[k].map(co=>`<div class="fcrow"><span class="fccode">${esc(co.code)}</span><span class="fctitle">${esc(co.title)}</span><span class="muted">${co.cr}cr</span><span class="chip chip-none">未修</span></div>`).join("")
      || `<div class="muted" style="padding:4px 0;">无</div>`;
    const gap=Math.max(0, req-app);
    return`<div class="fcterm">
      <h3 data-deg="${k}" style="cursor:pointer; user-select:none;">
        <span>${open?'▾':'▸'} ${catName[k]}</span>
        <span class="muted" style="font-weight:400;">${app} / ${req} cr</span>
      </h3>
      <div class="bartrack" style="margin:2px 0 8px;"><div class="barfill" style="width:${pctv.toFixed(0)}%; background:${catColor[k]};"></div></div>
      <div class="muted" style="margin-bottom:${open?'8px':'0'};">${gap>0?`还差 ${gap} 学分`:"✓ 学分已满足"}</div>
      ${open?`<div style="font-weight:600; font-size:12px; color:var(--green); margin:6px 0 2px;">已完成 (${p.done[k].length})</div>${doneList}
              <div style="font-weight:600; font-size:12px; color:var(--ink2); margin:10px 0 2px;">课表中未完成 (${p.remaining[k].length})</div>${remList}`:""}
    </div>`;
  }).join("");
  document.getElementById("pageDegree").innerHTML=
    `<div class="pagetitle">毕业进度</div>
     <div class="gpa-hero">
       <div class="n">${p.totApp} <span style="font-size:22px; color:var(--ink3);">/ ${p.totReq}</span></div>
       <div class="l">已修学分 · 总进度 ${overallPct.toFixed(0)}%</div>
       <div class="bartrack" style="margin-top:10px;"><div class="barfill" style="width:${overallPct.toFixed(0)}%;"></div></div>
     </div>
     <div class="helpcard" style="margin-bottom:12px;">⚠ 这是<b>个人估算</b>，按「选了 letter 且非 F/W」的课自动累加，分类按课程代码预设。<b>真正毕业审计以学校 Degree Audit 为准</b>（替代课、catalog 规则只有学校系统准）。分类不对可在下方「编辑分类」改。</div>
     ${cards}
     <button class="bigbtn" id="editCatBtn" style="margin-top:6px;">⚙ 编辑课程分类 / 毕业学分要求</button>
     <div id="catEditor"></div>`;
  document.querySelectorAll("#pageDegree h3[data-deg]").forEach(el=>{
    el.onclick=()=>{ const k=el.dataset.deg; window._degOpen[k]=!window._degOpen[k]; renderDegree(); };
  });
  const eb=document.getElementById("editCatBtn");
  if(eb) eb.onclick=()=>{ window._catEdit=!window._catEdit; renderCatEditor(); };
  renderCatEditor();
}
function renderCatEditor(){
  const box=document.getElementById("catEditor"); if(!box) return;
  if(!window._catEdit){ box.innerHTML=""; return; }
  const p=reqProgress();
  // required-credit overrides
  let reqRows=REQ_CATS.map(k=>`<div class="itemrow"><span style="width:130px; font-weight:600;">${k} 需要学分</span>
    <input data-reqedit="${k}" value="${p.req[k]}" inputmode="decimal" style="width:70px;"/></div>`).join("");
  // per-course category dropdowns
  let courseRows="";
  state.terms.forEach((t,ti)=>{
    t.courses.forEach((co,ci)=>{
      const cur=courseReqCat(co);
      const opts=["HSSA","General","Major","Electives","不计入"].map(o=>`<option ${o===cur?"selected":""}>${o}</option>`).join("");
      courseRows+=`<div class="itemrow"><span style="width:74px; font-weight:600; font-size:12px;">${esc(co.code)}</span>
        <span class="fctitle" style="flex:1;">${esc(co.title||t.name)}</span>
        <select data-catedit="${ti}-${ci}" style="width:96px;">${opts}</select></div>`;
    });
  });
  box.innerHTML=`<div class="fcterm" style="margin-top:10px;">
    <div style="font-weight:600; margin-bottom:6px;">毕业学分要求</div>${reqRows}
    <div style="font-weight:600; margin:12px 0 6px;">每门课归类（改完自动重算进度）</div>${courseRows}
  </div>`;
  box.querySelectorAll("[data-reqedit]").forEach(el=>{
    el.onchange=()=>{ state.reqOverride=state.reqOverride||{}; state.reqOverride[el.dataset.reqedit]=parseFloat(el.value)||0; renderDegree(); save(); };
  });
  box.querySelectorAll("[data-catedit]").forEach(el=>{
    el.onchange=()=>{ const [ti,ci]=el.dataset.catedit.split("-").map(Number);
      state.terms[ti].courses[ci].reqCat = el.value==="不计入"?"None":el.value;
      renderDegree(); save(); };
  });
}

function renderSettings(){
  document.getElementById("pageSettings").innerHTML=
    `<div class="pagetitle">设置</div>
     <div class="setcard">
       <div class="setrow" id="sExport"><div class="ic">⬇</div><div class="tx"><div class="t">导出备份</div><div class="d">把所有数据存成 JSON 文件</div></div><div class="ar">›</div></div>
       <div class="setrow" id="sImport"><div class="ic">⬆</div><div class="tx"><div class="t">导入备份</div><div class="d">从 JSON 文件恢复数据</div></div><div class="ar">›</div></div>
       <div class="setrow" id="sReset"><div class="ic" style="background:#FBE3E4; color:#B0484C;">↺</div><div class="tx"><div class="t">重置为空白课表</div><div class="d">清空所有成绩，保留课表框架</div></div><div class="ar">›</div></div>
     </div>
     <div class="helpcard">
       <b>怎么用</b><br>
       • 每条成绩填「得分 / 满分」，如 27/30 自动算 90%<br>
       • 类别 average × 权重 = 课程最终分<br>
       • 出分后在课程右边选 letter（A/B+/B…）<br>
       • 数据只存在这台设备，<b>定期导出备份</b><br><br>
       <span style="color:var(--ink3);">RHIT 成绩追踪 · 数据本地保存，不上传</span>
     </div>`;
  document.getElementById("sExport").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="gpa_backup_"+new Date().toISOString().slice(0,10)+".json"; a.click();
  };
  document.getElementById("sImport").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("sReset").onclick=()=>{if(confirm("重置为空白课表？你填的成绩会全部清空。")){state=seed(); openCourses={}; renderAll(); save();}};
}
document.getElementById("importFile").onchange=(e)=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{state=JSON.parse(rd.result); openCourses={}; renderAll(); save(); toast("导入成功 ✓");}catch(err){alert("文件格式错误");}};
  rd.readAsText(f);
};

document.querySelectorAll(".navbtn").forEach(b=>{
  b.onclick=()=>{
    page=b.dataset.nav;
    document.querySelectorAll(".navbtn").forEach(x=>x.classList.toggle("active",x===b));
    ["Grades","Gpa","Flow","Degree","Settings"].forEach(p=>{
      document.getElementById("page"+p).style.display=(p===page)?"block":"none";
    });
    window.scrollTo(0,0);
  };
});

load();
</script>
</body>
</html>
