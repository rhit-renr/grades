<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GPA">
<meta name="theme-color" content="#7EC8E3">
<title>成绩 &amp; GPA</title>
<style>
:root{
  /* 奶白主调 + 钢蓝/胡萝卜橙点缀 */
  --cream:#EBEBDF; --cream-d:#E0E0D0; --cream-l:#F4F4EC;
  --blue:#A8C2E0; --blue-d:#7BA0CC; --blue-dd:#5882B5; --blue-l:#D5E2F1; --blue-ll:#EAF1F8;
  --orange:#EA631B; --orange-d:#C9520F; --orange-l:#F9D9C4; --orange-ll:#FCEDE2;
  --ink:#3A3A2E; --ink2:#7A7A66; --ink3:#A8A894;
  --bg:#EBEBDF; --card:#FFFFFF; --line:#E4E4D6; --line2:#D2D2C2;
  --green:#5CA88A; --gold:#D99A3C; --red:#D9676B;
  --radm:16px; --radl:22px; --radxl:30px;
  --nav-h:66px;
}
@media (prefers-color-scheme: dark){
  :root{
    --cream:#2A2A22; --cream-d:#23231C; --cream-l:#33332A;
    --blue:#5882B5; --blue-d:#7BA0CC; --blue-dd:#A8C2E0; --blue-l:#2C3A4E; --blue-ll:#222C3A;
    --orange:#EA631B; --orange-d:#F0824A; --orange-l:#4A2A18; --orange-ll:#3A2114;
    --ink:#EDEDDF; --ink2:#B0B09A; --ink3:#71715E;
    --bg:#1C1C16; --card:#26261E; --line:#33332A; --line2:#42423A;
    --green:#6FC0A0; --gold:#E0A458; --red:#E08488;
  }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased;}
html,body{margin:0; padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.55;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
.wrap{max-width:760px; margin:0 auto; padding:0 16px;}

/* ---------- splash ---------- */
#splash{position:fixed; inset:0; z-index:999; background:var(--cream);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  transition:opacity .5s ease, visibility .5s ease;}
#splash.hide{opacity:0; visibility:hidden;}
#splash .icn{width:120px; height:120px; animation:pop .6s cubic-bezier(.34,1.56,.64,1);}
#splash .nm{font-size:30px; font-weight:800; color:var(--ink); letter-spacing:.5px; animation:rise .5s .15s both;}
#splash .nm .o{color:var(--orange);}
#splash .tag{font-size:13.5px; color:var(--ink2); animation:rise .5s .3s both; padding:0 30px; text-align:center; line-height:1.7;}
#splash .dots{display:flex; gap:6px; margin-top:8px; animation:rise .5s .45s both;}
#splash .dots span{width:7px; height:7px; border-radius:50%; background:var(--blue-d); animation:blink 1.2s infinite;}
#splash .dots span:nth-child(2){animation-delay:.2s;} #splash .dots span:nth-child(3){animation-delay:.4s;}
@keyframes pop{from{transform:scale(.4); opacity:0;}to{transform:scale(1); opacity:1;}}
@keyframes rise{from{transform:translateY(10px); opacity:0;}to{transform:none; opacity:1;}}
@keyframes blink{0%,100%{opacity:.3;}50%{opacity:1;}}

/* ---------- lightweight page header (no big hero) ---------- */
.phead{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 2px 4px;}
.phead .ttl{font-size:24px; font-weight:800; color:var(--ink); letter-spacing:.2px; display:flex; align-items:center; gap:9px;}
.phead .ttl .mini{width:30px; height:30px;}
.phead .gpa{text-align:right;}
.phead .gpa .n{font-size:26px; font-weight:800; color:var(--orange); line-height:1;}
.phead .gpa .l{font-size:10px; color:var(--ink2); font-weight:600;}
.langbtn{height:32px; padding:0 12px; border-radius:18px; background:var(--card); border:1.5px solid var(--line2);
  font-size:12px; font-weight:700; color:var(--blue-dd); cursor:pointer;}

.page{padding-top:10px; animation:fade .28s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
.pagetitle{font-size:20px; font-weight:800; margin:6px 0 16px; color:var(--ink); letter-spacing:.2px;}
.muted{font-size:12px; color:var(--ink2);}

.tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
.tab{font-size:12px; padding:8px 14px; border:none; background:var(--card); color:var(--ink2);
  border-radius:22px; cursor:pointer; box-shadow:0 2px 8px rgba(120,120,90,.08); transition:.18s; font-weight:600;}
.tab.active{background:var(--blue-d); color:#fff; font-weight:700; box-shadow:0 4px 14px rgba(123,160,204,.35); transform:translateY(-1px);}

.sumcards{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
.sumcard{border-radius:var(--radl); padding:14px 13px; box-shadow:0 3px 12px rgba(120,120,90,.07);}
.sumcard.c1{background:var(--blue-ll);}
.sumcard.c2{background:var(--orange-ll);}
.sumcard.c3{background:var(--cream-l);}
.sumcard .lbl{font-size:11px; color:var(--ink2); font-weight:600;}
.sumcard .val{font-size:22px; font-weight:800; color:var(--ink); margin-top:3px; letter-spacing:-.5px;}

.course{background:var(--card); border-radius:var(--radl); padding:15px 16px; margin-bottom:13px; box-shadow:0 4px 16px rgba(120,120,90,.08);}
.crow{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.cat{background:var(--cream-l); border-radius:var(--radm); padding:10px 12px; margin:8px 0;}
.cathead{display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:6px;}
.itemrow{display:flex; gap:6px; align-items:center; margin:5px 0;}

input,select{font-family:inherit; font-size:13px; height:36px; padding:0 11px;
  border:1.5px solid var(--line2); border-radius:12px; background:var(--card); color:var(--ink); outline:none; transition:.15s;}
input:focus,select:focus{border-color:var(--blue-d); box-shadow:0 0 0 3px rgba(123,160,204,.22);}
input::placeholder{color:var(--ink3);}
button{font-family:inherit; font-size:13px; height:36px; padding:0 14px; border:1.5px solid var(--line2);
  background:var(--card); color:var(--ink); border-radius:12px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:.14s; font-weight:600;}
button:active{transform:scale(.95);}
.btn-icon{width:36px; padding:0; justify-content:center; color:var(--ink3); border-color:transparent; background:transparent;}
.btn-icon:hover{color:var(--red);}
.bigbtn{width:100%; height:48px; font-size:14px; justify-content:center; margin-top:6px; border-style:dashed; border-radius:var(--radm); color:var(--blue-dd); font-weight:700;}

.pct{font-size:16px; font-weight:800; min-width:62px; text-align:right; letter-spacing:-.3px;}
.cr{font-size:11px; color:var(--ink2);}
.info{color:var(--blue-dd);}
.warn{color:var(--gold);}
.chip{display:inline-flex; align-items:center; padding:4px 11px; border-radius:14px; font-size:12px; font-weight:700;}
.chip-a{background:var(--blue-l); color:var(--blue-dd);} .chip-b{background:var(--blue-ll); color:var(--blue-dd);}
.chip-c{background:var(--orange-l); color:var(--orange-d);} .chip-d{background:var(--orange-ll); color:var(--orange-d);}
.chip-none{background:var(--line); color:var(--ink3);}

.gpa-hero{position:relative; overflow:hidden; background:var(--blue-ll); border-radius:var(--radxl);
  padding:26px 20px; text-align:center; margin-bottom:18px; box-shadow:0 4px 18px rgba(120,120,90,.1);}
.gpa-hero .n{font-size:54px; font-weight:800; color:var(--orange); line-height:1; letter-spacing:-2px;}
.gpa-hero .l{font-size:13px; color:var(--ink2); margin-top:6px; font-weight:600;}
.termbar{background:var(--card); border-radius:var(--radl); padding:13px 15px; margin-bottom:10px; box-shadow:0 2px 10px rgba(120,120,90,.07); display:flex; align-items:center; gap:13px;}
.termbar .nm{font-weight:700; font-size:14px; min-width:74px;}
.bartrack{flex:1; height:10px; background:var(--line); border-radius:6px; overflow:hidden;}
.barfill{height:100%; background:linear-gradient(90deg,var(--blue),var(--blue-dd)); border-radius:6px; transition:width .5s cubic-bezier(.4,0,.2,1);}
.termbar .g{font-weight:800; font-size:15px; color:var(--blue-dd); min-width:42px; text-align:right;}

.fcterm{background:var(--card); border-radius:var(--radl); padding:15px 16px; margin-bottom:13px; box-shadow:0 4px 16px rgba(120,120,90,.08);}
.fcterm h3{margin:0; font-size:15px; font-weight:800; color:var(--ink); display:flex; justify-content:space-between; align-items:center;}
.qtr{background:var(--cream-l); border-radius:var(--radm); padding:11px 13px; margin:10px 0;}
.qtrhead{font-size:13px; font-weight:700; color:var(--ink); margin-bottom:5px;}
.fcrow{display:flex; align-items:center; gap:8px; padding:7px 0; border-top:1px solid var(--line);}
.fcrow:first-of-type{border-top:none;}
.fccode{font-weight:700; font-size:13px; min-width:84px;}
.fctitle{flex:1; font-size:12px; color:var(--ink2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

.reqcard{background:var(--card); border-radius:var(--radl); padding:16px 17px; margin-bottom:13px; box-shadow:0 4px 16px rgba(120,120,90,.08);}
.reqhead{display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none;}
.reqname{font-size:16px; font-weight:800;}
.reqnums{font-size:12px; color:var(--ink2); margin-top:3px; font-weight:600;}
.reqtrack{height:11px; background:var(--line); border-radius:6px; overflow:hidden; margin:11px 0 3px;}
.reqfill{height:100%; border-radius:6px; transition:width .5s cubic-bezier(.4,0,.2,1);}
.reqlist{margin-top:11px;}
.reqli{display:flex; align-items:center; gap:8px; padding:6px 0; border-top:1px solid var(--line); font-size:13px;}
.reqli:first-child{border-top:none;}
.reqli .cd{font-weight:700; min-width:70px;}
.reqli .tl{flex:1; font-size:12px; color:var(--ink2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.bigstat{display:flex; gap:11px; margin-bottom:16px;}
.bigstat .s{flex:1; border-radius:var(--radl); padding:16px 12px; text-align:center; box-shadow:0 3px 12px rgba(120,120,90,.08);}
.bigstat .s.s1{background:var(--blue-ll);} .bigstat .s.s2{background:var(--orange-ll);} .bigstat .s.s3{background:var(--cream-l);}
.bigstat .s .v{font-size:26px; font-weight:800; color:var(--ink); letter-spacing:-1px;}
.bigstat .s .l{font-size:11px; color:var(--ink2); margin-top:3px; font-weight:600;}

.setcard{background:var(--card); border-radius:var(--radl); padding:6px 6px; margin-bottom:14px; box-shadow:0 4px 16px rgba(120,120,90,.08);}
.setrow{display:flex; align-items:center; gap:13px; padding:14px 14px; border-bottom:1px solid var(--line); cursor:pointer;}
.setrow:last-child{border-bottom:none;}
.setrow .ic{width:40px; height:40px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0;}
.setrow .ic.i1{background:var(--blue-l); color:var(--blue-dd);}
.setrow .ic.i2{background:var(--orange-l); color:var(--orange-d);}
.setrow .ic.i3{background:var(--cream-d); color:var(--ink2);}
.setrow .tx{flex:1;} .setrow .tx .t{font-weight:700; font-size:14px;} .setrow .tx .d{font-size:11px; color:var(--ink2); margin-top:1px;}
.setrow .ar{color:var(--ink3); font-size:18px;}
.helpcard{background:var(--cream-l); border-radius:var(--radm); padding:14px 16px; font-size:12px; color:var(--ink2); line-height:1.7;}

.selrow{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
.yearrow{display:flex; gap:7px; flex-wrap:wrap;}
.qrow{display:flex; gap:7px; flex-wrap:wrap;}
.seldiv{width:2px; height:24px; background:var(--line2); border-radius:1px; flex-shrink:0;}
.selrow .tab{padding:7px 13px;}
.qrow .tab{background:var(--cream-l); font-weight:600;}
.qrow .tab.active{background:var(--orange); color:#fff; box-shadow:0 4px 14px rgba(234,99,27,.3);}
.gpatoggle{height:32px; padding:0 14px; font-size:12px; font-weight:700; color:var(--ink2);
  background:var(--card); border:1.5px solid var(--line2); border-radius:18px; margin-bottom:12px; cursor:pointer;}
.bottomnav{position:fixed; left:12px; right:12px; bottom:calc(env(safe-area-inset-bottom) + 10px);
  height:var(--nav-h); background:var(--card); display:flex; border-radius:26px;
  box-shadow:0 8px 28px rgba(120,120,90,.2); border:1px solid var(--line); z-index:100;}
.navbtn{flex:1; border:none; background:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--ink3); cursor:pointer; height:var(--nav-h); transition:.18s; padding:0; border-radius:26px;}
.navbtn .ni{font-size:21px; line-height:1; transition:.18s;}
.navbtn .nl{font-size:10px; font-weight:700;}
.navbtn.active{color:var(--orange);}
.navbtn.active .ni{transform:translateY(-2px) scale(1.12);}
.navbtn:active{transform:scale(.9);}

.statusToast{position:fixed; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 22px); left:50%;
  transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--cream); font-size:12px;
  padding:9px 18px; border-radius:20px; opacity:0; pointer-events:none; transition:.28s; z-index:200; font-weight:700;}
.statusToast.show{opacity:.96; transform:translateX(-50%) translateY(0);}
</style>
</head>

<div id="splash">
  <div class="icn"><svg viewBox="0 0 200 200" fill="none">

<div class="wrap">

</div>

<nav class="bottomnav">
  <button class="navbtn active" data-nav="Grades"><span class="ni">📝</span><span class="nl" data-i18n="navGrades">成绩</span></button>

function load(){
  try{const r=localStorage.getItem(KEY); if(r) state=JSON.parse(r);}catch(e){}
  if(!state) state=seed();
  // migrate: ensure req field exists on every course
  for(const t of state.terms){ for(const co of t.courses){ if(co.req===undefined) co.req=defaultReq(co.code); } }
  applyStaticI18n();
  renderAll();
  // hide splash after a beat
  setTimeout(()=>{ const sp=document.getElementById("splash"); if(sp) sp.classList.add("hide"); }, 1700);
}

function catAvg(cat){const v=cat.items.filter(i=>i.got!==""&&i.got!=null&&i.max!==""&&i.max!=null&&Number(i.max)>0); if(!v.length)return null; return v.reduce((a,i)=>a+Number(i.got)/Number(i.max),0)/v.length;}
function courseFinal(co){let s=0,w=0; for(const cat of co.cats){const av=catAvg(cat); if(av!=null){s+=av*Number(cat.weight); w+=Number(cat.weight);}} return (co.cats.length&&w>0)?s:null;}
function weightSum(co){return co.cats.reduce((a,c)=>a+Number(c.weight||0),0);}
function termGpa(t){let qp=0,h=0; for(const co of t.courses){if(GPA_LETTERS.includes(co.letter)){qp+=Number(co.cr)*LETTERS[co.letter]; h+=Number(co.cr);}} return {gpa:h>0?qp/h:null,hrs:h,qp};}

function reqApplied(key){
  let cr=0, courses=[];
  for(const t of state.terms){ for(const co of t.courses){
    if(co.req===key && isDone(co)){ cr+=Number(co.cr||0); courses.push({term:t.name,co}); }
  }}
  return {cr, courses};
}
function reqRemainingCourses(key){
  // courses tagged to this req but NOT yet done (planned/in-progress)
  let list=[];
  for(const t of state.terms){ for(const co of t.courses){
    if(co.req===key && !isDone(co)) list.push({term:t.name,co});
  }}
  return list;
}
function cumGpa(){let qp=0,h=0; for(const t of state.terms){const g=termGpa(t); qp+=g.qp; h+=g.hrs;} return {gpa:h>0?qp/h:null,hrs:h};}

const REQ_CATS=["HSSA","General","Major","Electives"];
const REQ_DEFAULT={HSSA:36,General:44,Major:86,Electives:28};
function autoCat(code){
  const c=(code||"").toUpperCase().replace(/\s+/g,"");
  if(c.startsWith("ENGL")||c.startsWith("HUM")||c.startsWith("HSSA")) return "HSSA";
  if(c.startsWith("MA")||c.startsWith("PH")||c.startsWith("CHEM")||c.startsWith("ESL")||c.startsWith("RHIT")) return "General";
  if(c.startsWith("ME")||c.startsWith("EM")||c.startsWith("ES")) return "Major";
  if(c.startsWith("TECH")||c.startsWith("FREE")) return "Electives";
  return "Electives";
}
function courseReqCat(co){ return co.reqCat || autoCat(co.code); }
function isDone(co){ return co.letter && co.letter!=="F" && co.letter!=="W" && co.letter!=="I" && co.letter!=="U"; }
function reqProgress(){
  const req=Object.assign({}, REQ_DEFAULT, (state.reqOverride||{}));
  const applied={HSSA:0,General:0,Major:0,Electives:0};
  const done={HSSA:[],General:[],Major:[],Electives:[]};
  const remaining={HSSA:[],General:[],Major:[],Electives:[]};
  for(const t of state.terms){
    for(const co of t.courses){
      const cat=courseReqCat(co);
      if(!REQ_CATS.includes(cat)) continue;
      if(isDone(co)){ applied[cat]+=Number(co.cr||0); done[cat].push(co); }
      else { remaining[cat].push(co); }
    }
  }
  let totReq=0,totApp=0;
  for(const k of REQ_CATS){ totReq+=req[k]; totApp+=applied[k]; }
  return {req,applied,done,remaining,totReq,totApp};
}
function pct(x){return x==null?"—":(x*100).toFixed(2)+"%";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function termParts(name){

  return {year:name, q:""};
}
function qLabel(q){

function renderGrades(){
  const cur=state.terms[state.activeTerm];
  const curParts=termParts(cur.name);
  if(!activeYear) activeYear=curParts.year;
  // unique years in order
  const years=[]; state.terms.forEach(tm=>{const y=termParts(tm.name).year; if(!years.includes(y)) years.push(y);});
  if(!years.includes(activeYear)) activeYear=curParts.year;
  // year row
  const yearRow=years.map(y=>`<button class="tab ${y===activeYear?'active':''}" data-year="${y}">${y.replace("Y","Year ")}</button>`).join("");
  // quarter row: terms within activeYear
  const yterms=state.terms.map((tm,i)=>({tm,i})).filter(x=>termParts(x.tm.name).year===activeYear);
  // if current active term not in this year, switch to first of year
  if(termParts(cur.name).year!==activeYear && yterms.length){ state.activeTerm=yterms[0].i; }
  const qRow=yterms.map(({tm,i})=>`<button class="tab ${i===state.activeTerm?'active':''}" data-term="${i}">${qLabel(termParts(tm.name).q)}</button>`).join("");
  // recompute active term after possible switch
  const t=state.terms[state.activeTerm];
  const g=termGpa(t), totCr=t.courses.reduce((a,c)=>a+Number(c.cr||0),0);

function curTerm(){return state.terms[state.activeTerm];}
function bindGrades(){
  const root=document.getElementById("pageGrades");
  root.querySelectorAll(".yearrow .tab").forEach(b=>b.onclick=()=>{activeYear=b.dataset.year; renderGrades();});
  root.querySelectorAll(".qrow .tab").forEach(b=>b.onclick=()=>{state.activeTerm=+b.dataset.term; renderGrades();});
  const gt=document.getElementById("gpaToggle");
  if(gt) gt.onclick=()=>{gpaOpen=!gpaOpen; renderGrades();};
  root.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>handleAct(el.dataset));
  root.querySelectorAll("[data-edit]").forEach(el=>{
    const ev=el.tagName==="SELECT"?"change":"input";
    el.addEventListener(ev,()=>handleEdit(el));
    if(el.tagName!=="SELECT") el.addEventListener("blur",()=>{renderGrades(); renderHero(); save();});
  });
  const ab=document.getElementById("addCourseBtn");
  if(ab) ab.onclick=()=>{curTerm().courses.push({id:uid(),code:T("newCourse"),title:"",cr:4,letter:"",req:"",cats:[]}); renderGrades(); save();};
}
function handleEdit(el){
  const d=el.dataset, t=curTerm(), co=t.courses[+d.c], v=el.value;
  switch(d.edit){
    case "co-code": co.code=v; break;
    case "co-title": co.title=v; break;
    case "co-cr": co.cr=v===""?0:parseFloat(v)||0; break;
    case "co-letter": co.letter=v; renderGrades(); renderHero(); save(); return;
    case "co-req": co.req=v; renderGrades(); save(); return;
    case "cat-name": co.cats[+d.cat].name=v; break;
    case "cat-weight": co.cats[+d.cat].weight=v===""?0:parseFloat(v)||0; break;
    case "item-label": co.cats[+d.cat].items[+d.i].label=v; break;
    case "item-got": co.cats[+d.cat].items[+d.i].got=v===""?"":parseFloat(v); break;
    case "item-max": co.cats[+d.cat].items[+d.i].max=v===""?"":parseFloat(v); break;
  }
  renderHero();
}
function handleAct(d){
  const t=curTerm();
  switch(d.act){
    case "toggle":{const co=t.courses[+d.c]; openCourses[co.id]=!openCourses[co.id]; renderGrades(); break;}
    case "del-course": if(confirm(T("confirmDelCourse"))){t.courses.splice(+d.c,1); renderGrades(); save();} break;
    case "add-cat": t.courses[+d.c].cats.push({id:uid(),name:T("newCat"),weight:0,items:[]}); renderGrades(); save(); break;
    case "del-cat": t.courses[+d.c].cats.splice(+d.cat,1); renderGrades(); save(); break;
    case "add-item": t.courses[+d.c].cats[+d.cat].items.push({id:uid(),label:"",got:"",max:100}); renderGrades(); save(); break;
    case "del-item": t.courses[+d.c].cats[+d.cat].items.splice(+d.i,1); renderGrades(); save(); break;
  }
}

function renderGpa(){
  const cg=cumGpa();
  const bars=state.terms.map(t=>{
    const g=termGpa(t);
    const w=g.gpa!=null?(g.gpa/4*100):0;
    return`<div class="termbar"><div class="nm">${esc(t.name)}</div>
      <div class="bartrack"><div class="barfill" style="width:${w.toFixed(0)}%;"></div></div>
      <div class="g">${g.gpa!=null?g.gpa.toFixed(2):"—"}</div></div>`;
  }).join("");
  document.getElementById("pageGpa").innerHTML=
    `<div class="pagetitle">${T("gpaOverview")}</div>
     <div class="gpa-hero"><span class="blob b1"></span><span class="blob b2"></span><div class="n">${cg.gpa!=null?cg.gpa.toFixed(3):"—"}</div>
       <div class="l">${T("cumGpaDot",{n:cg.hrs})}</div></div>
     <div class="muted" style="margin-bottom:8px;">${T("eachTermGpa")}</div>
     ${bars}
     <div class="helpcard" style="margin-top:12px;">${T("gpaNote")}</div>`;
}

function renderFlow(){
  // group terms by year prefix (Y1/Y2/Y3/Y4)
  const groups={};
  state.terms.forEach((t,ti)=>{
    const m=(t.name.match(/^Y\d+/)||["其他"])[0];
    (groups[m]=groups[m]||[]).push({t,ti});
  });
  const blocks=Object.keys(groups).map(yr=>{
    const terms=groups[yr];
    const open=openYears[yr]!==false; // default open
    let yCr=0, yQp=0, yH=0;
    terms.forEach(({t})=>{ const g=termGpa(t); yCr+=t.courses.reduce((a,c)=>a+Number(c.cr||0),0); yQp+=g.qp; yH+=g.hrs; });
    const yGpa=yH>0?(yQp/yH):null;
    const inner = open? terms.map(({t})=>{
      const rows=t.courses.map(co=>{
        const fin=courseFinal(co);
        return`<div class="fcrow"><span class="fccode">${esc(co.code)}</span>
          <span class="fctitle">${esc(co.title)}</span>
          <span class="muted">${fin!=null?(fin*100).toFixed(0)+"%":""}</span>
          ${letterChip(co.letter)}</div>`;
      }).join("");
      const g=termGpa(t), cr=t.courses.reduce((a,c)=>a+Number(c.cr||0),0);
      return`<div class="qtr"><div class="qtrhead">${esc(t.name)} <span class="muted" style="font-weight:400;">${cr} cr${g.gpa!=null?` · GPA ${g.gpa.toFixed(2)}`:""}</span></div>${rows}</div>`;
    }).join("") : "";
    return`<div class="fcterm">
      <h3 data-year="${yr}" style="cursor:pointer; user-select:none;">
        <span>${yr.replace("Y","Year ")} <span class="muted" style="font-weight:400;">${yCr} cr${yGpa!=null?` · GPA ${yGpa.toFixed(2)}`:""}</span></span>
        <span style="color:var(--sky-d);">${open?"▾":"▸"}</span>
      </h3>${inner}</div>`;
  }).join("");
  document.getElementById("pageFlow").innerHTML=
    `<div class="pagetitle">${T("fourYear")}</div>
     <div class="helpcard" style="margin-bottom:12px;">${T("flowNote")}</div>${blocks}`;
  document.querySelectorAll('#pageFlow [data-year]').forEach(el=>{
    el.onclick=()=>{ const y=el.dataset.year; openYears[y]=(openYears[y]===false); renderFlow(); };
  });
}
function renderDegree(){
  let totApplied=0, totReq=194;
  const cards=REQS.map(rq=>{
    const ap=reqApplied(rq.key);
    totApplied+=ap.cr;
    const pctv=Math.min(100, rq.required>0? ap.cr/rq.required*100 : 0);
    const done=ap.cr>=rq.required;
    const color=done?"var(--green)":"linear-gradient(90deg,var(--sky),var(--sky-d))";
    const open=openReqs[rq.key];
    const doneList=ap.courses.map(({term,co})=>`<div class="reqli"><span class="cd">${esc(co.code)}</span><span class="tl">${esc(co.title)}</span><span class="muted">${co.cr}cr</span>${letterChip(co.letter)}</div>`).join("");
    const planned=reqRemainingCourses(rq.key);
    const planList=planned.length?`<div class="muted" style="margin-top:8px; margin-bottom:2px;">${T("plannedNotDone")}</div>`+planned.map(({term,co})=>`<div class="reqli" style="opacity:.7;"><span class="cd">${esc(co.code)}</span><span class="tl">${esc(co.title)} · ${esc(term)}</span><span class="muted">${co.cr}cr</span></div>`).join(""):"";
    const gap=Math.max(0, rq.required-ap.cr);
    return`<div class="reqcard">
      <div class="reqhead" data-req="${rq.key}">
        <div><div class="reqname">${esc(reqName(rq))}</div>
          <div class="reqnums">${ap.cr} / ${rq.required} cr${gap>0?` · ${T("stillNeed",{n:gap})}`:` · ${T("reqDone")}`}</div></div>
        <span style="color:var(--sky-d);">${open?"▾":"▸"}</span>
      </div>
      <div class="reqtrack"><div class="reqfill" style="width:${pctv.toFixed(0)}%; background:${color};"></div></div>
      ${open?`<div class="reqlist">${doneList||`<div class="muted">${T("noDone")}</div>`}${planList}</div>`:""}
    </div>`;
  }).join("");
  const overallPct=Math.min(100, totApplied/totReq*100);
  const cg=cumGpa();
  document.getElementById("pageDegree").innerHTML=
    `<div class="pagetitle">${T("degreeProgress")}</div>
     <div class="bigstat">
       <div class="s s1"><div class="v">${totApplied}</div><div class="l">${T("appliedCr")}</div></div>
       <div class="s s2"><div class="v">${totReq}</div><div class="l">${T("needCr")}</div></div>
       <div class="s s3"><div class="v">${overallPct.toFixed(0)}%</div><div class="l">${T("totalProg")}</div></div>
     </div>
     <div class="reqtrack" style="height:12px; margin-bottom:14px;"><div class="reqfill" style="width:${overallPct.toFixed(0)}%; background:linear-gradient(90deg,var(--sky),var(--sky-dd));"></div></div>
     <div class="helpcard" style="margin-bottom:12px;">${T("degreeWarn")}</div>
     ${cards}
     <div class="helpcard" style="margin-top:4px;">${T("doneOnly",{g:(cg.gpa!=null?cg.gpa.toFixed(2):"—")})}</div>`;
  document.querySelectorAll('#pageDegree [data-req]').forEach(el=>{
    el.onclick=()=>{ const k=el.dataset.req; openReqs[k]=!openReqs[k]; renderDegree(); };
  });
}
function renderSettings(){
  document.getElementById("pageSettings").innerHTML=
    `<div class="pagetitle">${T("settings")}</div>
     <div class="setcard">
       <div class="setrow" id="sExport"><div class="ic i1">⬇</div><div class="tx"><div class="t">${T("exportT")}</div><div class="d">${T("exportD")}</div></div><div class="ar">›</div></div>
       <div class="setrow" id="sImport"><div class="ic i2">⬆</div><div class="tx"><div class="t">${T("importT")}</div><div class="d">${T("importD")}</div></div><div class="ar">›</div></div>
       <div class="setrow" id="sReset"><div class="ic i3">↺</div><div class="tx"><div class="t">${T("resetT")}</div><div class="d">${T("resetD")}</div></div><div class="ar">›</div></div>
     </div>
     <div class="helpcard">
       <b>${T("howto")}</b><br>
       • ${T("howto1")}<br>
       • ${T("howto2")}<br>
       • ${T("howto3")}<br>
       • ${T("howto4")}<br><br>
       <span style="color:var(--ink3);">${T("footer")}</span>
     </div>`;
  document.getElementById("sExport").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="gpa_backup_"+new Date().toISOString().slice(0,10)+".json"; a.click();
  };
  document.getElementById("sImport").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("sReset").onclick=()=>{if(confirm(T("confirmReset"))){state=seed(); openCourses={}; renderAll(); save();}};
}
document.getElementById("importFile").onchange=(e)=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{state=JSON.parse(rd.result); openCourses={}; renderAll(); save(); toast(T("imported"));}catch(err){alert(T("badFile"));}};
  rd.readAsText(f);
};

const langBtn=document.getElementById("langBtn");
if(langBtn) langBtn.onclick=()=>{ lang = lang==="zh"?"en":"zh"; localStorage.setItem(LANG_KEY,lang); openCourses={}; renderAll(); };
document.querySelectorAll(".navbtn").forEach(b=>{
  b.onclick=()=>{
    page=b.dataset.nav;
    document.querySelectorAll(".navbtn").forEach(x=>x.classList.toggle("active",x===b));
    ["Grades","Gpa","Flow","Degree","Settings"].forEach(p=>{
      document.getElementById("page"+p).style.display=(p===page)?"block":"none";
    });
    window.scrollTo(0,0);
  };
});

load();
</script>
</body>
